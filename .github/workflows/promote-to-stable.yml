name: Promote to Stable

on:
  workflow_dispatch:
    inputs:
      unstable_version:
        description: "Unstable version to promote (e.g. 0.2.87-beta.12)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: promote-to-stable
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          VERSION="${{ inputs.unstable_version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$'; then
            echo "::error::Expected X.Y.Z-beta.N, got: $VERSION"
            exit 1
          fi

      - name: Derive tags
        id: versions
        run: |
          UNSTABLE="${{ inputs.unstable_version }}"
          STABLE="${UNSTABLE%-beta.*}"
          echo "unstable_tag=v${UNSTABLE}" >> "$GITHUB_OUTPUT"
          echo "stable_tag=v${STABLE}" >> "$GITHUB_OUTPUT"
          echo "stable_version=${STABLE}" >> "$GITHUB_OUTPUT"

      - name: Verify unstable release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.versions.outputs.unstable_tag }}" \
            --repo "${{ github.repository }}" \
            --json tagName,assets >/tmp/release.json

          python3 - <<'PY'
          import json
          data = json.load(open('/tmp/release.json'))
          assets = data.get('assets', [])
          if not assets:
              raise SystemExit("::error::Unstable release has no assets to promote.")
          print(f"Found {len(assets)} assets")
          PY

      - name: Ensure stable release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.versions.outputs.stable_tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Stable release ${{ steps.versions.outputs.stable_tag }} already exists."
            exit 1
          fi

      - name: Trigger stable rebuild from private tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build-release.yml \
            --repo "${{ github.repository }}" \
            -f version="${{ steps.versions.outputs.stable_version }}"

          echo "Stable rebuild requested for ${{ steps.versions.outputs.stable_tag }}."
          echo "build-release.yml will verify the private tag and publish update.json."
