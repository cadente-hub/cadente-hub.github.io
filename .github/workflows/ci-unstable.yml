name: CI -> Unstable Channel

on:
  repository_dispatch:
    types: [build-unstable]
  workflow_dispatch:
    inputs:
      sha:
        description: "Private repo commit SHA to build (defaults to main HEAD)"
        required: false

permissions:
  contents: write
  actions: read

concurrency:
  group: unstable-${{ github.event.client_payload.sha || inputs.sha || github.run_id }}
  cancel-in-progress: false

env:
  PRIVATE_REPO: jeancatarina/catarina-claude

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.meta.outputs.version }}
      build_version: ${{ steps.meta.outputs.build_version }}
      unstable_tag: ${{ steps.meta.outputs.unstable_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Resolve private SHA and version
        id: meta
        env:
          PRIVATE_TOKEN: ${{ secrets.CATARINA_PRIVATE_READ_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          INPUT_SHA: ${{ github.event.client_payload.sha || inputs.sha }}
          INPUT_BUILD_VERSION: ${{ github.event.client_payload.build_version || github.event.client_payload.version }}
          DISPATCH_SECRET: ${{ secrets.DISPATCH_SECRET }}
        run: |
          set -euo pipefail
          echo "::add-mask::${PRIVATE_TOKEN}"
          PUBLIC_REPO_DIR="$GITHUB_WORKSPACE"

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SHA="${{ github.event.client_payload.sha }}"
            SIGNATURE="${{ github.event.client_payload.signature }}"
            TIMESTAMP="${{ github.event.client_payload.timestamp }}"

            if [ -z "$SHA" ] || [ -z "$SIGNATURE" ] || [ -z "$TIMESTAMP" ]; then
              echo "::error::Missing signed dispatch fields."
              exit 1
            fi

            EXPECTED_SIG=$(echo -n "${SHA}:${TIMESTAMP}" | openssl dgst -sha256 -hmac "$DISPATCH_SECRET" | awk '{print $2}')
            if [ "$SIGNATURE" != "$EXPECTED_SIG" ]; then
              echo "::error::Invalid dispatch signature."
              exit 1
            fi

            NOW=$(date +%s)
            DIFF=$((NOW - TIMESTAMP))
            if [ "$DIFF" -gt 900 ] || [ "$DIFF" -lt -60 ]; then
              echo "::error::Dispatch timestamp out of range (${DIFF}s)."
              exit 1
            fi
          elif [ -n "${INPUT_SHA}" ]; then
            SHA="${INPUT_SHA}"
          else
            SHA=$(curl -sf \
              -H "Authorization: Bearer ${PRIVATE_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${PRIVATE_REPO}/commits/main" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["sha"])')
          fi

          git clone --depth=1 "https://x-access-token:${PRIVATE_TOKEN}@github.com/${PRIVATE_REPO}.git" source >/dev/null 2>&1
          cd source
          git fetch --depth=1 origin "$SHA" >/dev/null 2>&1
          git checkout "$SHA" >/dev/null 2>&1

          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$SHA" ]; then
            echo "::error::SHA mismatch. Expected ${SHA:0:8}, got ${ACTUAL_SHA:0:8}."
            exit 1
          fi

          VERSION=$(python3 -c 'import json; print(json.load(open("src-tauri/tauri.conf.json"))["version"])')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid app version in private repo: $VERSION"
            exit 1
          fi

          REQUESTED_BUILD_VERSION="${INPUT_BUILD_VERSION#v}"
          BETA_CANDIDATES=$(mktemp)
          {
            gh release list --repo "${{ github.repository }}" --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null || true
            if [ -f "$PUBLIC_REPO_DIR/update-beta.json" ]; then
              python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("version", ""))' "$PUBLIC_REPO_DIR/update-beta.json" || true
            fi
            for rev in $(git -C "$PUBLIC_REPO_DIR" log --format=%H -- update-beta.json | head -100); do
              git -C "$PUBLIC_REPO_DIR" show "${rev}:update-beta.json" 2>/dev/null \
                | python3 -c 'import json,sys; print(json.load(sys.stdin).get("version", ""))' 2>/dev/null || true
            done
          } > "$BETA_CANDIDATES"
          MAX_BETA_NUMBER=$(python3 - "$VERSION" "$BETA_CANDIDATES" <<'PYEOF'
          import re
          import sys

          base = sys.argv[1]
          candidates_file = sys.argv[2]
          pattern = re.compile(rf"^v?{re.escape(base)}-beta\.(\d+)$")
          highest = 0
          with open(candidates_file) as fh:
              for line in fh:
                  match = pattern.match(line.strip())
                  if match:
                      number = int(match.group(1))
                      if number <= 65535:
                          highest = max(highest, number)
          print(highest)
          PYEOF
          )
          rm -f "$BETA_CANDIDATES"
          NEXT_BETA_NUMBER=$((MAX_BETA_NUMBER + 1))

          if [ -n "${REQUESTED_BUILD_VERSION:-}" ]; then
            if ! echo "$REQUESTED_BUILD_VERSION" | grep -qE "^${VERSION}-beta\.[0-9]+$"; then
              echo "::error::Invalid beta build version: $REQUESTED_BUILD_VERSION (expected ${VERSION}-beta.N)"
              exit 1
            fi
            REQUESTED_BETA_NUMBER="${REQUESTED_BUILD_VERSION##*.}"
            if [ "$REQUESTED_BETA_NUMBER" -eq "$NEXT_BETA_NUMBER" ]; then
              BUILD_VERSION="$REQUESTED_BUILD_VERSION"
            else
              BUILD_VERSION="${VERSION}-beta.${NEXT_BETA_NUMBER}"
            fi
          else
            BUILD_VERSION="${VERSION}-beta.${NEXT_BETA_NUMBER}"
          fi

          echo "Highest known beta for ${VERSION}: ${MAX_BETA_NUMBER}"
          echo "Resolved beta build version: ${BUILD_VERSION}"

          UNSTABLE_TAG="v${BUILD_VERSION}"

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "unstable_tag=$UNSTABLE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=Cadente ${UNSTABLE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Delete source checkout
        if: always()
        run: rm -rf source

  build-macos:
    needs: resolve
    runs-on: macos-15
    steps:
      - name: Clone private repo at exact SHA
        env:
          PRIVATE_TOKEN: ${{ secrets.CATARINA_PRIVATE_READ_TOKEN }}
        run: |
          set -euo pipefail
          echo "::add-mask::${PRIVATE_TOKEN}"
          git clone --depth=1 "https://x-access-token:${PRIVATE_TOKEN}@github.com/${PRIVATE_REPO}.git" source >/dev/null 2>&1
          cd source
          git fetch --depth=1 origin "${{ needs.resolve.outputs.sha }}" >/dev/null 2>&1
          git checkout "${{ needs.resolve.outputs.sha }}" >/dev/null 2>&1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/src-tauri/target
          key: unstable-macos-cargo-${{ hashFiles('source/src-tauri/Cargo.lock') }}
          restore-keys: |
            unstable-macos-cargo-

      - name: Patch beta version in source
        working-directory: source
        env:
          BETA_VERSION: ${{ needs.resolve.outputs.build_version }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          v = os.environ['BETA_VERSION']
          for p in ['src-tauri/tauri.conf.json', 'package.json']:
              d = json.load(open(p))
              d['version'] = v
              open(p, 'w').write(json.dumps(d, indent=2))
          print('Patched to:', v)
          PYEOF

      - name: Install frontend dependencies
        working-directory: source
        run: npm ci 2>&1 | tail -5

      - name: Build ARM64
        working-directory: source
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          CADENTE_BUILD_VERSION: ${{ needs.resolve.outputs.build_version }}
          RUSTC_WRAPPER: sccache
          PRIVATE_LOG_TOKEN: ${{ secrets.CATARINA_PRIVATE_WRITE_TOKEN || secrets.CATARINA_PRIVATE_LOG_TOKEN }}
        run: |
          persist_private_build_log() {
            local log_file="$1" label="$2" repo_dir safe_workflow safe_job dest_dir dest_rel
            safe_workflow="$(printf '%s' "${GITHUB_WORKFLOW:-workflow}" | tr -cs 'A-Za-z0-9._-' '-')"
            safe_job="$(printf '%s' "${GITHUB_JOB:-job}" | tr -cs 'A-Za-z0-9._-' '-')"
            dest_rel=".cadente-build-logs/public-actions/${safe_workflow}/${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-0}/${safe_job}-${label}.log"
            if [ -z "${PRIVATE_LOG_TOKEN:-}" ]; then
              echo "::error::Build failed; private log token is not configured."
              return
            fi
            echo "::add-mask::${PRIVATE_LOG_TOKEN}"
            repo_dir="$(mktemp -d)"
            if git clone --depth=1 "https://x-access-token:${PRIVATE_LOG_TOKEN}@github.com/${PRIVATE_REPO}.git" "$repo_dir" >/dev/null 2>&1; then
              dest_dir="$repo_dir/$(dirname "$dest_rel")"
              mkdir -p "$dest_dir"
              cp "$log_file" "$repo_dir/$dest_rel"
              git -C "$repo_dir" config user.name "github-actions[bot]"
              git -C "$repo_dir" config user.email "github-actions[bot]@users.noreply.github.com"
              git -C "$repo_dir" add -f "$dest_rel"
              git -C "$repo_dir" commit -m "ci: store private build log for ${GITHUB_RUN_ID:-local} ${safe_job}" >/dev/null 2>&1 || true
              if git -C "$repo_dir" push >/dev/null 2>&1; then
                echo "::error::Build failed. Full log committed privately at ${dest_rel}."
              else
                echo "::error::Build failed. Could not push private build log."
              fi
            else
              echo "::error::Build failed. Could not clone private log repository."
            fi
            rm -rf "$repo_dir"
          }
          if npx tauri build --target aarch64-apple-darwin > /tmp/build-arm64.log 2>&1; then
            echo "ARM64 build succeeded ($(wc -l < /tmp/build-arm64.log) log lines suppressed)"
          else
            EXIT_CODE=$?
            persist_private_build_log /tmp/build-arm64.log macos-arm64
            rm -f /tmp/build-arm64.log
            exit $EXIT_CODE
          fi
          rm -f /tmp/build-arm64.log

      - name: Build x86_64
        working-directory: source
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          CADENTE_BUILD_VERSION: ${{ needs.resolve.outputs.build_version }}
          RUSTC_WRAPPER: sccache
          PRIVATE_LOG_TOKEN: ${{ secrets.CATARINA_PRIVATE_WRITE_TOKEN || secrets.CATARINA_PRIVATE_LOG_TOKEN }}
        run: |
          persist_private_build_log() {
            local log_file="$1" label="$2" repo_dir safe_workflow safe_job dest_dir dest_rel
            safe_workflow="$(printf '%s' "${GITHUB_WORKFLOW:-workflow}" | tr -cs 'A-Za-z0-9._-' '-')"
            safe_job="$(printf '%s' "${GITHUB_JOB:-job}" | tr -cs 'A-Za-z0-9._-' '-')"
            dest_rel=".cadente-build-logs/public-actions/${safe_workflow}/${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-0}/${safe_job}-${label}.log"
            if [ -z "${PRIVATE_LOG_TOKEN:-}" ]; then
              echo "::error::Build failed; private log token is not configured."
              return
            fi
            echo "::add-mask::${PRIVATE_LOG_TOKEN}"
            repo_dir="$(mktemp -d)"
            if git clone --depth=1 "https://x-access-token:${PRIVATE_LOG_TOKEN}@github.com/${PRIVATE_REPO}.git" "$repo_dir" >/dev/null 2>&1; then
              dest_dir="$repo_dir/$(dirname "$dest_rel")"
              mkdir -p "$dest_dir"
              cp "$log_file" "$repo_dir/$dest_rel"
              git -C "$repo_dir" config user.name "github-actions[bot]"
              git -C "$repo_dir" config user.email "github-actions[bot]@users.noreply.github.com"
              git -C "$repo_dir" add -f "$dest_rel"
              git -C "$repo_dir" commit -m "ci: store private build log for ${GITHUB_RUN_ID:-local} ${safe_job}" >/dev/null 2>&1 || true
              if git -C "$repo_dir" push >/dev/null 2>&1; then
                echo "::error::Build failed. Full log committed privately at ${dest_rel}."
              else
                echo "::error::Build failed. Could not push private build log."
              fi
            else
              echo "::error::Build failed. Could not clone private log repository."
            fi
            rm -rf "$repo_dir"
          }
          if npx tauri build --target x86_64-apple-darwin > /tmp/build-x64.log 2>&1; then
            echo "x86_64 build succeeded ($(wc -l < /tmp/build-x64.log) log lines suppressed)"
          else
            EXIT_CODE=$?
            persist_private_build_log /tmp/build-x64.log macos-x64
            rm -f /tmp/build-x64.log
            exit $EXIT_CODE
          fi
          rm -f /tmp/build-x64.log

      - name: Collect artifacts
        shell: bash
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          mkdir -p artifacts
          BUNDLE_ARM="source/src-tauri/target/aarch64-apple-darwin/release/bundle"
          BUNDLE_X64="source/src-tauri/target/x86_64-apple-darwin/release/bundle"

          find "$BUNDLE_ARM/dmg" -name "*.dmg" -exec cp {} "artifacts/cadente-${VERSION}-macos-arm64.dmg" \;
          find "$BUNDLE_ARM/macos" -name "*.app.tar.gz" -exec cp {} "artifacts/cadente-${VERSION}-macos-arm64.app.tar.gz" \;
          find "$BUNDLE_ARM/macos" -name "*.app.tar.gz.sig" -exec cp {} "artifacts/cadente-${VERSION}-macos-arm64.app.tar.gz.sig" \;
          find "$BUNDLE_X64/dmg" -name "*.dmg" -exec cp {} "artifacts/cadente-${VERSION}-macos-x64.dmg" \;
          find "$BUNDLE_X64/macos" -name "*.app.tar.gz" -exec cp {} "artifacts/cadente-${VERSION}-macos-x64.app.tar.gz" \;
          find "$BUNDLE_X64/macos" -name "*.app.tar.gz.sig" -exec cp {} "artifacts/cadente-${VERSION}-macos-x64.app.tar.gz.sig" \;

      - name: Smoke test native macOS app boot
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          ARCH="$(uname -m)"
          if [ "$ARCH" = "arm64" ]; then
            ARCHIVE="artifacts/cadente-${VERSION}-macos-arm64.app.tar.gz"
          else
            ARCHIVE="artifacts/cadente-${VERSION}-macos-x64.app.tar.gz"
          fi
          rm -rf /tmp/cadente-boot-smoke
          mkdir -p /tmp/cadente-boot-smoke
          tar -xzf "$ARCHIVE" -C /tmp/cadente-boot-smoke
          python3 source/scripts/packaged-boot-smoke.py \
            --macos-app /tmp/cadente-boot-smoke/Cadente.app \
            --timeout-secs 30

      - uses: actions/upload-artifact@v4
        with:
          name: unstable-artifacts-macos
          path: artifacts/*
          if-no-files-found: error

      - name: Cleanup source
        if: always()
        run: rm -rf source /tmp/build-arm64.log /tmp/build-x64.log

  smoke-macos-intel:
    needs: [resolve, build-macos]
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: unstable-artifacts-macos
          path: artifacts

      - name: Smoke test Intel macOS app boot
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          ARCHIVE="artifacts/cadente-${VERSION}-macos-x64.app.tar.gz"
          rm -rf /tmp/cadente-boot-smoke
          mkdir -p /tmp/cadente-boot-smoke
          tar -xzf "$ARCHIVE" -C /tmp/cadente-boot-smoke
          python3 scripts/packaged-boot-smoke.py \
            --macos-app /tmp/cadente-boot-smoke/Cadente.app \
            --timeout-secs 30

  build-linux:
    needs: resolve
    runs-on: ubuntu-22.04
    steps:
      - name: Clone private repo at exact SHA
        env:
          PRIVATE_TOKEN: ${{ secrets.CATARINA_PRIVATE_READ_TOKEN }}
        run: |
          set -euo pipefail
          echo "::add-mask::${PRIVATE_TOKEN}"
          git clone --depth=1 "https://x-access-token:${PRIVATE_TOKEN}@github.com/${PRIVATE_REPO}.git" source >/dev/null 2>&1
          cd source
          git fetch --depth=1 origin "${{ needs.resolve.outputs.sha }}" >/dev/null 2>&1
          git checkout "${{ needs.resolve.outputs.sha }}" >/dev/null 2>&1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/src-tauri/target
          key: unstable-linux-cargo-${{ hashFiles('source/src-tauri/Cargo.lock') }}
          restore-keys: |
            unstable-linux-cargo-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf lld rpm

      - name: Patch beta version in source
        working-directory: source
        env:
          BETA_VERSION: ${{ needs.resolve.outputs.build_version }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          v = os.environ['BETA_VERSION']
          for p in ['src-tauri/tauri.conf.json', 'package.json']:
              d = json.load(open(p))
              d['version'] = v
              open(p, 'w').write(json.dumps(d, indent=2))
          print('Patched to:', v)
          PYEOF

      - name: Install frontend dependencies
        working-directory: source
        run: npm ci 2>&1 | tail -5

      - name: Build Linux app
        working-directory: source
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          CADENTE_BUILD_VERSION: ${{ needs.resolve.outputs.build_version }}
          RUSTC_WRAPPER: sccache
          PRIVATE_LOG_TOKEN: ${{ secrets.CATARINA_PRIVATE_WRITE_TOKEN || secrets.CATARINA_PRIVATE_LOG_TOKEN }}
        run: |
          persist_private_build_log() {
            local log_file="$1" label="$2" repo_dir safe_workflow safe_job dest_dir dest_rel
            safe_workflow="$(printf '%s' "${GITHUB_WORKFLOW:-workflow}" | tr -cs 'A-Za-z0-9._-' '-')"
            safe_job="$(printf '%s' "${GITHUB_JOB:-job}" | tr -cs 'A-Za-z0-9._-' '-')"
            dest_rel=".cadente-build-logs/public-actions/${safe_workflow}/${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-0}/${safe_job}-${label}.log"
            if [ -z "${PRIVATE_LOG_TOKEN:-}" ]; then
              echo "::error::Build failed; private log token is not configured."
              return
            fi
            echo "::add-mask::${PRIVATE_LOG_TOKEN}"
            repo_dir="$(mktemp -d)"
            if git clone --depth=1 "https://x-access-token:${PRIVATE_LOG_TOKEN}@github.com/${PRIVATE_REPO}.git" "$repo_dir" >/dev/null 2>&1; then
              dest_dir="$repo_dir/$(dirname "$dest_rel")"
              mkdir -p "$dest_dir"
              cp "$log_file" "$repo_dir/$dest_rel"
              git -C "$repo_dir" config user.name "github-actions[bot]"
              git -C "$repo_dir" config user.email "github-actions[bot]@users.noreply.github.com"
              git -C "$repo_dir" add -f "$dest_rel"
              git -C "$repo_dir" commit -m "ci: store private build log for ${GITHUB_RUN_ID:-local} ${safe_job}" >/dev/null 2>&1 || true
              if git -C "$repo_dir" push >/dev/null 2>&1; then
                echo "::error::Build failed. Full log committed privately at ${dest_rel}."
              else
                echo "::error::Build failed. Could not push private build log."
              fi
            else
              echo "::error::Build failed. Could not clone private log repository."
            fi
            rm -rf "$repo_dir"
          }
          if npx tauri build > /tmp/build-linux.log 2>&1; then
            echo "Linux build succeeded ($(wc -l < /tmp/build-linux.log) log lines suppressed)"
          else
            EXIT_CODE=$?
            persist_private_build_log /tmp/build-linux.log linux-x64
            rm -f /tmp/build-linux.log
            exit $EXIT_CODE
          fi
          rm -f /tmp/build-linux.log

      - name: Collect artifacts
        shell: bash
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          mkdir -p artifacts
          BUNDLE_DIR="source/src-tauri/target/release/bundle"

          find "$BUNDLE_DIR/appimage" -name "*.AppImage" -exec cp {} "artifacts/cadente-${VERSION}-linux-x64.AppImage" \;
          find "$BUNDLE_DIR/deb" -name "*.deb" -exec cp {} "artifacts/cadente-${VERSION}-linux-x64.deb" \;
          find "$BUNDLE_DIR/rpm" -name "*.rpm" -exec cp {} "artifacts/cadente-${VERSION}-linux-x64.rpm" \;
          find "$BUNDLE_DIR/appimage" -name "*.AppImage.tar.gz" -exec cp {} "artifacts/cadente-${VERSION}-linux-x64.AppImage.tar.gz" \;
          find "$BUNDLE_DIR/appimage" -name "*.AppImage.tar.gz.sig" -exec cp {} "artifacts/cadente-${VERSION}-linux-x64.AppImage.tar.gz.sig" \;

      - uses: actions/upload-artifact@v4
        with:
          name: unstable-artifacts-linux
          path: artifacts/*
          if-no-files-found: error

      - name: Cleanup source
        if: always()
        run: rm -rf source /tmp/build-linux.log

  build-windows:
    needs: resolve
    runs-on: windows-latest
    steps:
      - name: Clone private repo at exact SHA
        shell: bash
        env:
          PRIVATE_TOKEN: ${{ secrets.CATARINA_PRIVATE_READ_TOKEN }}
        run: |
          set -euo pipefail
          echo "::add-mask::${PRIVATE_TOKEN}"
          git clone --depth=1 "https://x-access-token:${PRIVATE_TOKEN}@github.com/${PRIVATE_REPO}.git" source >/dev/null 2>&1
          cd source
          git fetch --depth=1 origin "${{ needs.resolve.outputs.sha }}" >/dev/null 2>&1
          git checkout "${{ needs.resolve.outputs.sha }}" >/dev/null 2>&1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/src-tauri/target
          key: unstable-windows-cargo-${{ hashFiles('source/src-tauri/Cargo.lock') }}
          restore-keys: |
            unstable-windows-cargo-

      - name: Patch beta version in source
        working-directory: source
        shell: bash
        env:
          APP_VERSION: ${{ needs.resolve.outputs.version }}
          BETA_VERSION: ${{ needs.resolve.outputs.build_version }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          # WiX/MSI rejects semver prerelease identifiers like "beta.16".
          # Keep the Windows package version stable-compatible and embed the
          # exact beta identity through CADENTE_BUILD_VERSION at compile time.
          v = os.environ['APP_VERSION']
          beta = os.environ['BETA_VERSION']
          for p in ['src-tauri/tauri.conf.json', 'package.json']:
              d = json.load(open(p))
              d['version'] = v
              open(p, 'w').write(json.dumps(d, indent=2))
          print('Patched Windows package version to:', v)
          print('Embedded beta build version:', beta)
          PYEOF

      - name: Install frontend dependencies
        working-directory: source
        shell: bash
        run: npm ci 2>&1 | tail -5

      - name: Build Windows app
        working-directory: source
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          CADENTE_BUILD_VERSION: ${{ needs.resolve.outputs.build_version }}
          RUSTC_WRAPPER: sccache
          PRIVATE_LOG_TOKEN: ${{ secrets.CATARINA_PRIVATE_WRITE_TOKEN || secrets.CATARINA_PRIVATE_LOG_TOKEN }}
        run: |
          persist_private_build_log() {
            local log_file="$1" label="$2" repo_dir safe_workflow safe_job dest_dir dest_rel
            safe_workflow="$(printf '%s' "${GITHUB_WORKFLOW:-workflow}" | tr -cs 'A-Za-z0-9._-' '-')"
            safe_job="$(printf '%s' "${GITHUB_JOB:-job}" | tr -cs 'A-Za-z0-9._-' '-')"
            dest_rel=".cadente-build-logs/public-actions/${safe_workflow}/${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-0}/${safe_job}-${label}.log"
            if [ -z "${PRIVATE_LOG_TOKEN:-}" ]; then
              echo "::error::Build failed; private log token is not configured."
              return
            fi
            echo "::add-mask::${PRIVATE_LOG_TOKEN}"
            repo_dir="$(mktemp -d)"
            if git clone --depth=1 "https://x-access-token:${PRIVATE_LOG_TOKEN}@github.com/${PRIVATE_REPO}.git" "$repo_dir" >/dev/null 2>&1; then
              dest_dir="$repo_dir/$(dirname "$dest_rel")"
              mkdir -p "$dest_dir"
              cp "$log_file" "$repo_dir/$dest_rel"
              git -C "$repo_dir" config user.name "github-actions[bot]"
              git -C "$repo_dir" config user.email "github-actions[bot]@users.noreply.github.com"
              git -C "$repo_dir" add -f "$dest_rel"
              git -C "$repo_dir" commit -m "ci: store private build log for ${GITHUB_RUN_ID:-local} ${safe_job}" >/dev/null 2>&1 || true
              if git -C "$repo_dir" push >/dev/null 2>&1; then
                echo "::error::Build failed. Full log committed privately at ${dest_rel}."
              else
                echo "::error::Build failed. Could not push private build log."
              fi
            else
              echo "::error::Build failed. Could not clone private log repository."
            fi
            rm -rf "$repo_dir"
          }
          if npx tauri build > /tmp/build-windows.log 2>&1; then
            echo "Windows build succeeded ($(wc -l < /tmp/build-windows.log) log lines suppressed)"
          else
            EXIT_CODE=$?
            persist_private_build_log /tmp/build-windows.log windows-x64
            rm -f /tmp/build-windows.log
            exit $EXIT_CODE
          fi
          rm -f /tmp/build-windows.log

      - name: Collect artifacts
        shell: bash
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          mkdir -p artifacts
          BUNDLE_DIR="source/src-tauri/target/release/bundle"

          find "$BUNDLE_DIR/msi" -name "*.msi" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.msi" \;
          find "$BUNDLE_DIR/nsis" -name "*.exe" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.exe" \;
          find "$BUNDLE_DIR/msi" -name "*.msi.zip" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.msi.zip" \;
          find "$BUNDLE_DIR/msi" -name "*.msi.zip.sig" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.msi.zip.sig" \;
          find "$BUNDLE_DIR/nsis" -name "*.nsis.zip" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.nsis.zip" \;
          find "$BUNDLE_DIR/nsis" -name "*.nsis.zip.sig" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.nsis.zip.sig" \;

      - uses: actions/upload-artifact@v4
        with:
          name: unstable-artifacts-windows
          path: artifacts/*
          if-no-files-found: error

      - name: Cleanup source
        if: always()
        shell: bash
        run: rm -rf source /tmp/build-windows.log

  publish:
    needs: [resolve, build-macos, smoke-macos-intel, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd all-artifacts
          sha256sum * > SHA256SUMS.txt 2>/dev/null || shasum -a 256 * > SHA256SUMS.txt

      - name: Generate update-beta.json
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          TAG="${{ needs.resolve.outputs.unstable_tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_NUM="${{ github.run_number }}"

          ARM_SIG=$(cat "all-artifacts/cadente-${VERSION}-macos-arm64.app.tar.gz.sig" 2>/dev/null || true)
          X64_SIG=$(cat "all-artifacts/cadente-${VERSION}-macos-x64.app.tar.gz.sig" 2>/dev/null || true)
          LINUX_SIG=$(cat "all-artifacts/cadente-${VERSION}-linux-x64.AppImage.tar.gz.sig" 2>/dev/null || true)
          WIN_SIG=$(cat "all-artifacts/cadente-${VERSION}-windows-x64.nsis.zip.sig" 2>/dev/null || \
                    cat "all-artifacts/cadente-${VERSION}-windows-x64.msi.zip.sig" 2>/dev/null || true)
          WIN_FILE="nsis.zip"
          [ -f "all-artifacts/cadente-${VERSION}-windows-x64.nsis.zip.sig" ] || WIN_FILE="msi.zip"

          MISSING=""
          [ -z "$ARM_SIG" ]   && MISSING="${MISSING} darwin-aarch64"
          [ -z "$X64_SIG" ]   && MISSING="${MISSING} darwin-x86_64"
          [ -z "$LINUX_SIG" ] && MISSING="${MISSING} linux-x86_64"
          [ -z "$WIN_SIG" ]   && MISSING="${MISSING} windows-x86_64"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing signatures for:${MISSING}"
            ls -la all-artifacts/ || true
            exit 1
          fi

          jq -n \
            --arg version "${TAG#v}" \
            --arg notes "Cadente beta build #${RUN_NUM}" \
            --arg pub_date "$PUB_DATE" \
            --arg arm_sig "$ARM_SIG" \
            --arg x64_sig "$X64_SIG" \
            --arg linux_sig "$LINUX_SIG" \
            --arg win_sig "$WIN_SIG" \
            --arg arm_url "${BASE_URL}/cadente-${VERSION}-macos-arm64.app.tar.gz" \
            --arg x64_url "${BASE_URL}/cadente-${VERSION}-macos-x64.app.tar.gz" \
            --arg linux_url "${BASE_URL}/cadente-${VERSION}-linux-x64.AppImage.tar.gz" \
            --arg win_url "${BASE_URL}/cadente-${VERSION}-windows-x64.${WIN_FILE}" \
            '{version:$version,notes:$notes,pub_date:$pub_date,platforms:{"darwin-aarch64":{signature:$arm_sig,url:$arm_url},"darwin-x86_64":{signature:$x64_sig,url:$x64_url},"linux-x86_64":{signature:$linux_sig,url:$linux_url},"windows-x86_64":{signature:$win_sig,url:$win_url}}}' \
            > update-beta.json

          echo "Generated update-beta.json for ${TAG}"

      - name: Validate generated unstable release
        run: |
          python3 scripts/release-asset-guard.py \
            --manifest update-beta.json \
            --artifacts-dir all-artifacts \
            --macos-arm64-archive "all-artifacts/cadente-${{ needs.resolve.outputs.version }}-macos-arm64.app.tar.gz" \
            --macos-x64-archive "all-artifacts/cadente-${{ needs.resolve.outputs.version }}-macos-x64.app.tar.gz"

      - name: Delete previous floating unstable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete unstable --repo "${{ github.repository }}" --yes 2>/dev/null || true
          git push origin :refs/tags/unstable 2>/dev/null || true

      - name: Create versioned unstable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.unstable_tag }}
          name: ${{ needs.resolve.outputs.release_name }}
          prerelease: true
          make_latest: false
          body: |
            Automated unstable release from `${{ needs.resolve.outputs.sha }}`.

            - Base version: `${{ needs.resolve.outputs.version }}`
            - Channel: `unstable`
            - Build number: `${{ github.run_number }}`
          files: all-artifacts/*
          fail_on_unmatched_files: true

      - name: Create floating unstable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: unstable
          name: Latest Unstable Build
          prerelease: true
          make_latest: false
          body: |
            Tracks the latest unstable release.

            Current: `${{ needs.resolve.outputs.unstable_tag }}`
          files: all-artifacts/*
          fail_on_unmatched_files: true

      - name: Publish update-beta.json
        env:
          GH_TOKEN: ${{ secrets.CATARINA_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.unstable_tag }}"
          echo "::add-mask::${GH_TOKEN}"
          git clone --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            site-repo >/dev/null 2>&1
          cp update-beta.json site-repo/update-beta.json
          cd site-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update-beta.json
          git commit -m "chore: update-beta.json for ${TAG}" || echo "No changes to commit"
          git push
