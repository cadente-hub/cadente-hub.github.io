<svg viewBox="0 0 520 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a87a"/>
      <stop offset="50%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#b08050"/>
    </linearGradient>
    <linearGradient id="c-spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#a07048"/>
    </linearGradient>
  </defs>

  <!-- Symbol (scaled to 64x64, centered in 80x80 area) -->
  <g transform="translate(8, 8) scale(0.125)">
    <!-- C arc -->
    <path
      d="M 379 153 A 160 160 0 1 0 379 359"
      fill="none"
      stroke="url(#c-grad)"
      stroke-width="56"
      stroke-linecap="round"
    />
    <!-- Inner arc -->
    <path
      d="M 356 188 A 118 118 0 1 0 356 324"
      fill="none"
      stroke="url(#c-grad)"
      stroke-width="4"
      stroke-linecap="round"
      opacity="0.2"
    />
    <!-- Sparkle -->
    <path
      d="M 424 240 L 429 252 L 442 256 L 429 260 L 424 272 L 419 260 L 406 256 L 419 252 Z"
      fill="url(#c-spark)"
    />
  </g>

  <!-- Wordmark: "Cadente" — for light backgrounds (dark text) -->
  <text
    x="88"
    y="47"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="26"
    font-weight="500"
    letter-spacing="0.5"
    fill="#1c1c20"
  >
    <tspan>Cadente</tspan>
    <tspan dx="6" font-weight="300" fill="#6b6b78">Hub</tspan>
  </text>
</svg>
